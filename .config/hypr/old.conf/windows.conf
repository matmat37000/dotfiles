##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrulev2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Blacklist
windowrule = match:initial_title ^(vesktop|Discord)$, tag +hidden
windowrule = match:initial_class ^(org.gnome.Nautilus)$, match:title ^(Sus|Perso)$, no_screen_share true
windowrule = match:initial_class ^(imv)$, match:title ^(.*/home/mathiol/Pictures/Saved/Sus/.*)$, no_screen_share true
windowrule = match:initial_class ^(zen)$, match:title ^(Locked Folder - Immich.*)$, no_screen_share true
windowrule = match:initial_class ^(zen)$, match:title ^(.*Private Browsing)$, tag +hidden

windowrule {
  name = hide-from-recording
  match {
    tag = hidden
  }

  no_screen_share = true
}

# Fix some dragging issues with XWayland
windowrule {
  name = fix-dragging
  match:class = ^$
  match:title = ^$
  match:fullscreen = false
  match:float = true
  match:pin = false
  match:xwayland = true

  no_focus = true
}

# File picker
windowrule {
  name = file-picker
  match {
    initial_class = ^(xdg-desktop-portal-gtk)$
  }

  float = true
  center = true
  size = 1200 800
  dim_around = true
}

# Clip Paint Studio
windowrule {
  name = csp
  match:initial_class = ^(explorer.exe)$
  match:title = ^Wine Desktop$

  fullscreen = true
  monitor = "DP-1"
  workspace = 10 silent
}

# Steam
windowrule = match:title ^(Steam)$, tag +steamapps
windowrule = match:title ^(Steam .*)$, center true
windowrule = match:class ^(steam)$, match:title ^(Friends List|Steam)$, workspace special:steam
windowrule = match:class ^(steam)$, match:title ^(Friends List)$, size <420 100%

windowrule {
  name = SteamApps
  match:tag = steamapps

  tile = true
}

#windowrulev2 = float,class:(zen),title=(Picture-in-Picture)
#windowrulev2 = pin,class:(zen),title=(Picture-in-Picture)
#windowrulev2 = float, class:^(zen.*)$, title:^(Picture-in-Picture.*)$
#windowrulev2 = pin, class:^(zen.*)$, title:^(Picture-in-Picture.*)$
#windowrulev2 = renderunfocused, class:^(zen.*)$, title:^(Picture-in-Picture.*)$

windowrule {
  name = Picture-in-Picture
  match:class = ^(zen)$
  match:title = ^(Picture-in-Picture)$

  float = true
  pin = true
  keep_aspect_ratio = true
  render_unfocused = true
}

windowrule = match:class cs2, immediate yes

windowrule {
    name = gamescope
    match:class = ^(gamescope)$

    immediate = true
    fullscreen = true
}

windowrule = match:class ^(clipstudiopaint.exe)$, tile yes
windowrule {
    name = clipstudiopaint-popup
    match:class = ^(clipstudiopaint.exe)$
    match:float = true

    stay_focused = true
    allows_input = true
    float = true
    no_shadow = true
    border_size = 0
    animation = no
}

windowrule {
  name = Minecraft
  match:initial_class = ^(Minecraft.*)$

  float = true
  center = true
}

