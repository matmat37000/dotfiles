############
### BLUR ###
############

# Blur - Waybar
layerrule {
  name = waybar
  match:namespace = waybar

  blur = on
  ignore_alpha = 0.5
}
# layerrulev2 = ignorezero, waybar

# Blur - Swaync
layerrule {
  name = swaync
  match:namespace = ^(swaync-control-center|swaync-notification-window)$

  blur = on
  ignore_alpha = 0.5
}

#layerrulev2 = blur, swaync-control-center
#layerrulev2 = blur, swaync-notification-window
#layerrulev2 = ignorezero, swaync-control-center
#layerrulev2 = ignorezero, swaync-notification-window
#layerrulev2 = ignorealpha 0.5, swaync-control-center
#layerrulev2 = ignorealpha 0.5, swaync-notification-window

# Blur - rofi
