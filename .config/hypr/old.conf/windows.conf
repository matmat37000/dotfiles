# Steam Big Picture Mode
windowrule = match:initial_title ^(Steam Big Picture Mode)$, match:initial_class ^(steam)$, tile true

# Tearing
#windowrulev2 = immediate, class:^(cs2)$
#windowrulev2 = immediate, class:^(steam_app_[0-9]+)$
#windowrulev2 = fullscreen, class:^(steam_app_[0-9]+)$
